<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이상형 월드컵</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c27;
      --accent: #ff3c5f;
      --accent2: #ff8c00;
      --gold: #ffd700;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: #2a2a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      animation: fadeIn 0.6s ease;
    }

    .logo {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-align: center;
    }

    .logo-sub {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 50px;
      text-align: center;
    }

    .setup-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .setup-card h2 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 24px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .setup-card h2 span.badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 20px;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(255,60,95,0.05);
    }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    #drop-zone p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    #drop-zone p strong { color: var(--text); }
    #file-input { display: none; }

    /* Preview grid */
    #preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
      max-height: 240px;
      overflow-y: auto;
    }
    #preview-grid::-webkit-scrollbar { width: 4px; }
    #preview-grid::-webkit-scrollbar-track { background: transparent; }
    #preview-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .preview-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: popIn 0.3s ease;
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-thumb .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,0.75);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .preview-thumb:hover .remove-btn { opacity: 1; }

    .count-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .count-bar .count-num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
    }

    /* Title input */
    .input-row {
      margin-bottom: 20px;
    }
    .input-row label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-row input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    /* Size selector */
    .size-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .size-btn {
      flex: 1;
      min-width: 70px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .size-btn:hover { border-color: var(--accent); color: var(--text); }
    .size-btn.active {
      border-color: var(--accent);
      background: rgba(255,60,95,0.15);
      color: var(--accent);
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 30px rgba(255,60,95,0.35);
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(255,60,95,0.5);
    }
    .start-btn:active { transform: translateY(0); }
    .start-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .sample-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .sample-link a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .sample-link a:hover { text-decoration: underline; }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .game-header {
      width: 100%;
      max-width: 1000px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .game-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .round-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      max-width: 1000px;
      margin-bottom: 36px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .vs-row {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
    }

    .vs-label {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--accent);
      text-align: center;
      text-shadow: 0 0 30px rgba(255,60,95,0.6);
      animation: pulse 1.5s ease infinite;
    }

    /* Choice card */
    .choice-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--card);
      aspect-ratio: 3/4;
    }
    .choice-card:hover {
      border-color: var(--accent);
      transform: scale(1.02) translateY(-4px);
      box-shadow: 0 20px 60px rgba(255,60,95,0.3);
    }
    .choice-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .choice-card:hover img { transform: scale(1.05); }

    .choice-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      pointer-events: none;
    }

    .choice-card .card-name {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 20px 18px 18px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .choice-card .select-ring {
      position: absolute;
      inset: 0;
      border: 4px solid var(--accent);
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .choice-card:hover .select-ring { opacity: 0.6; }

    /* Selected animation */
    .choice-card.selected {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px var(--gold), 0 20px 60px rgba(255,215,0,0.4) !important;
      transform: scale(1.04) translateY(-6px) !important;
    }
    .choice-card.selected .select-ring {
      opacity: 1;
      border-color: var(--gold);
    }
    .choice-card.rejected {
      opacity: 0.3;
      filter: grayscale(0.6);
      transform: scale(0.96);
    }

    /* ── WINNER SCREEN ── */
    #winner-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .winner-crown {
      font-size: 4rem;
      animation: bounce 1s ease infinite alternate;
      margin-bottom: 16px;
    }
    .winner-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      background: linear-gradient(135deg, var(--gold), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .winner-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .winner-image-wrap {
      position: relative;
      width: min(400px, 88vw);
      aspect-ratio: 3/4;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid var(--gold);
      box-shadow: 0 0 80px rgba(255,215,0,0.4), 0 40px 100px rgba(0,0,0,0.6);
      margin-bottom: 28px;
      animation: winnerPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .winner-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .winner-image-wrap .winner-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,215,0,0.15), transparent 70%);
      pointer-events: none;
    }
    .winner-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--gold);
      margin-bottom: 32px;
      text-shadow: 0 0 30px rgba(255,215,0,0.5);
    }

    .winner-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action-btn {
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 8px 25px rgba(255,60,95,0.4);
    }
    .action-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 14px 35px rgba(255,60,95,0.55); }
    .action-btn.secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .action-btn.secondary:hover { border-color: var(--accent); background: rgba(255,60,95,0.08); }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 12px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 1000;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    @keyframes winnerPop { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .vs-row { grid-template-columns: 1fr; grid-template-rows: 1fr auto 1fr; }
      .vs-label { font-size: 2rem; }
      .choice-card { aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setup-screen">
  <div class="logo">이상형 월드컵</div>
  <div class="logo-sub">World Cup Tournament</div>

  <div class="setup-card">
    <h2>📸 사진 업로드 <span class="badge">필수</span></h2>

    <div id="drop-zone">
      <div class="icon">🖼️</div>
      <p><strong>클릭하거나 드래그하여 사진 추가</strong><br>여러 장 동시 업로드 가능 · JPG, PNG, GIF, WebP</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple />

    <div id="preview-grid"></div>

    <div class="count-bar">
      <span>업로드된 사진: <span class="count-num" id="img-count">0</span>장</span>
      <span id="count-hint" style="color: var(--accent)"></span>
    </div>

    <div class="input-row">
      <label>토너먼트 제목</label>
      <input type="text" id="tourney-title" placeholder="예: 최애 음식 월드컵, 여행지 월드컵..." maxlength="40" />
    </div>

    <div style="margin-bottom:12px; font-size:0.8rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase;">토너먼트 규모</div>
    <div class="size-selector" id="size-selector">
      <button class="size-btn" data-size="4">4강</button>
      <button class="size-btn active" data-size="8">8강</button>
      <button class="size-btn" data-size="16">16강</button>
      <button class="size-btn" data-size="32">32강</button>
    </div>

    <button class="start-btn" id="start-btn" disabled>시작하기 🔥</button>
    <div class="sample-link"><a id="sample-link">샘플 이미지로 체험해보기</a></div>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game-screen">
  <div class="game-header">
    <div class="game-title" id="game-title-text">이상형 월드컵</div>
    <div class="round-badge" id="round-badge">8강</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="match-info">1 / 4 경기</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="vs-row">
    <div class="choice-card" id="card-left">
      <img id="img-left" src="" alt="" />
      <div class="card-overlay"></div>
      <div class="card-name" id="name-left"></div>
      <div class="select-ring"></div>
    </div>
    <div class="vs-label">VS</div>
    <div class="choice-card" id="card-right">
      <img id="img-right" src="" alt="" />
      <div class="card-overlay"></div>
      <div class="card-name" id="name-right"></div>
      <div class="select-ring"></div>
    </div>
  </div>
</div>

<!-- ══ WINNER SCREEN ══ -->
<div id="winner-screen">
  <div class="winner-crown">👑</div>
  <div class="winner-title">최종 우승!</div>
  <div class="winner-subtitle">Tournament Champion</div>
  <div class="winner-image-wrap">
    <img id="winner-img" src="" alt="" />
    <div class="winner-glow"></div>
  </div>
  <div class="winner-name" id="winner-name"></div>
  <div class="winner-actions">
    <button class="action-btn primary" id="restart-btn">다시 하기 🔄</button>
    <button class="action-btn secondary" id="new-btn">새 토너먼트 📂</button>
  </div>
</div>

<script>
  // ── State ──
  let images = [];        // {src, name}
  let selectedSize = 8;
  let currentRound = [];  // contestants this round
  let nextRound = [];     // winners advancing
  let matchIndex = 0;
  let totalMatches = 0;
  let matchesPlayed = 0;
  let roundName = '';
  let tourneyTitle = '이상형 월드컵';
  let busy = false;

  // ── Setup DOM refs ──
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const previewGrid = document.getElementById('preview-grid');
  const imgCount = document.getElementById('img-count');
  const countHint = document.getElementById('count-hint');
  const startBtn = document.getElementById('start-btn');
  const sizeSelector = document.getElementById('size-selector');

  // Drop zone
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => addFiles(e.target.files));

  function addFiles(files) {
    [...files].forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const name = file.name.replace(/\.[^.]+$/, '');
        images.push({ src: ev.target.result, name });
        renderPreviews();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPreviews() {
    previewGrid.innerHTML = '';
    images.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'preview-thumb';
      div.innerHTML = `<img src="${img.src}" alt="${img.name}" />
        <button class="remove-btn" data-idx="${i}">✕</button>`;
      previewGrid.appendChild(div);
    });
    previewGrid.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        images.splice(+btn.dataset.idx, 1);
        renderPreviews();
      });
    });
    updateCountUI();
  }

  function updateCountUI() {
    imgCount.textContent = images.length;
    const sizes = [4, 8, 16, 32];
    const valid = sizes.filter(s => s <= images.length);
    if (valid.length === 0) {
      countHint.textContent = '최소 4장 필요';
      startBtn.disabled = true;
    } else {
      const max = valid[valid.length - 1];
      if (!valid.includes(selectedSize)) {
        selectedSize = max;
        sizeSelector.querySelectorAll('.size-btn').forEach(b => {
          b.classList.toggle('active', +b.dataset.size === selectedSize);
        });
      }
      countHint.textContent = `최대 ${max}강 가능`;
      startBtn.disabled = false;
    }
    // Disable unavailable size buttons
    sizeSelector.querySelectorAll('.size-btn').forEach(b => {
      const s = +b.dataset.size;
      b.disabled = s > images.length;
      b.style.opacity = s > images.length ? '0.3' : '1';
      b.style.cursor = s > images.length ? 'not-allowed' : 'pointer';
    });
  }

  // Size buttons
  sizeSelector.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (+btn.dataset.size > images.length) return;
      selectedSize = +btn.dataset.size;
      sizeSelector.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Sample images
  document.getElementById('sample-link').addEventListener('click', loadSamples);

  function loadSamples() {
    const samples = [
      { name: '산', emoji: '🏔️', color: '#2a4a7f,#6a9fd8' },
      { name: '바다', emoji: '🌊', color: '#0a7a8f,#40c4d8' },
      { name: '도시', emoji: '🌆', color: '#1a1a2e,#e94560' },
      { name: '숲', emoji: '🌲', color: '#1a3a1a,#5cb85c' },
      { name: '사막', emoji: '🌵', color: '#b8860b,#f4c542' },
      { name: '설원', emoji: '❄️', color: '#c0d8e8,#ffffff' },
      { name: '화산', emoji: '🌋', color: '#3d1a00,#ff4500' },
      { name: '폭포', emoji: '💧', color: '#003d5b,#00b4d8' },
    ];
    images = samples.map(s => ({ src: makeEmojiImage(s.emoji, s.color), name: s.name }));
    renderPreviews();
    document.getElementById('tourney-title').value = '여행지 월드컵';
  }

  function makeEmojiImage(emoji, gradient) {
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 530;
    const ctx = canvas.getContext('2d');
    const [c1, c2] = gradient.split(',');
    const grd = ctx.createLinearGradient(0, 0, 400, 530);
    grd.addColorStop(0, c1); grd.addColorStop(1, c2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, 400, 530);
    ctx.font = '160px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 200, 265);
    return canvas.toDataURL();
  }

  // Start
  startBtn.addEventListener('click', startTournament);

  function startTournament() {
    tourneyTitle = document.getElementById('tourney-title').value.trim() || '이상형 월드컵';
    // Shuffle & pick
    const pool = [...images].sort(() => Math.random() - 0.5).slice(0, selectedSize);
    currentRound = pool;
    matchIndex = 0;
    nextRound = [];
    totalMatches = selectedSize - 1;
    matchesPlayed = 0;
    updateRoundName();
    document.getElementById('game-title-text').textContent = tourneyTitle;
    showScreen('game');
    loadMatch();
  }

  function updateRoundName() {
    const remaining = currentRound.length;
    const names = { 2: '결승', 4: '4강', 8: '8강', 16: '16강', 32: '32강' };
    roundName = names[remaining] || `${remaining}강`;
    document.getElementById('round-badge').textContent = roundName;
  }

  function loadMatch() {
    const left = currentRound[matchIndex * 2];
    const right = currentRound[matchIndex * 2 + 1];
    document.getElementById('img-left').src = left.src;
    document.getElementById('name-left').textContent = left.name;
    document.getElementById('img-right').src = right.src;
    document.getElementById('name-right').textContent = right.name;

    const roundMatches = currentRound.length / 2;
    const roundMatchIdx = matchIndex + 1;
    document.getElementById('match-info').textContent = `${roundMatchIdx} / ${roundMatches} 경기`;
    const pct = Math.round((matchesPlayed / totalMatches) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';

    // Animate in
    const cardLeft = document.getElementById('card-left');
    const cardRight = document.getElementById('card-right');
    cardLeft.classList.remove('selected', 'rejected');
    cardRight.classList.remove('selected', 'rejected');
    cardLeft.style.animation = 'none'; cardRight.style.animation = 'none';
    requestAnimationFrame(() => {
      cardLeft.style.animation = 'popIn 0.4s ease';
      cardRight.style.animation = 'popIn 0.4s ease 0.08s both';
    });
    busy = false;
  }

  ['card-left', 'card-right'].forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      if (busy) return;
      choose(id === 'card-left' ? 'left' : 'right');
    });
  });

  function choose(side) {
    busy = true;
    const winner = side === 'left' ? currentRound[matchIndex * 2] : currentRound[matchIndex * 2 + 1];
    const winCard = document.getElementById(side === 'left' ? 'card-left' : 'card-right');
    const loseCard = document.getElementById(side === 'left' ? 'card-right' : 'card-left');

    winCard.classList.add('selected');
    loseCard.classList.add('rejected');

    setTimeout(() => {
      nextRound.push(winner);
      matchIndex++;
      matchesPlayed++;

      if (matchIndex >= currentRound.length / 2) {
        // Round over
        if (nextRound.length === 1) {
          showWinner(nextRound[0]);
        } else {
          currentRound = nextRound;
          nextRound = [];
          matchIndex = 0;
          updateRoundName();
          loadMatch();
        }
      } else {
        loadMatch();
      }
    }, 650);
  }

  function showWinner(winner) {
    document.getElementById('winner-img').src = winner.src;
    document.getElementById('winner-name').textContent = `🏆 ${winner.name}`;
    showScreen('winner');
    spawnConfetti();
    const pFill = document.getElementById('progress-fill');
    pFill.style.width = '100%';
  }

  function spawnConfetti() {
    const colors = ['#ff3c5f', '#ff8c00', '#ffd700', '#00b4d8', '#7fff00', '#ff69b4'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.8) + 's';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 30);
    }
  }

  document.getElementById('restart-btn').addEventListener('click', () => {
    showScreen('setup');
    // Re-trigger tournament with same images
    startTournament();
    showScreen('game');
  });
  document.getElementById('new-btn').addEventListener('click', () => {
    images = [];
    previewGrid.innerHTML = '';
    updateCountUI();
    document.getElementById('tourney-title').value = '';
    showScreen('setup');
  });

  function showScreen(name) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('winner-screen').style.display = 'none';
    if (name === 'setup') {
      document.getElementById('setup-screen').style.display = 'flex';
    } else if (name === 'game') {
      document.getElementById('game-screen').style.display = 'flex';
    } else if (name === 'winner') {
      document.getElementById('winner-screen').style.display = 'flex';
    }
  }
</script>
</body>
</html>
